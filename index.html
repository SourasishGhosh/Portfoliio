<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Title and meta are set dynamically from config.js -->
  <title>Portfolio</title>
  <meta name="description" content="Portfolio" />

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Navigation ──────────────────────────────────────────── -->
  <nav>
    <span id="nav-logo"></span>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#contact" class="nav-cta">Contact</a></li>
    </ul>
  </nav>

  <!-- ── Main Content ────────────────────────────────────────── -->
  <main>

    <!-- Hero -->
    <section id="hero" aria-label="Introduction"></section>

    <!-- About -->
    <section aria-label="About">
      <div class="section-label">About</div>
      <div class="card" id="about"></div>
    </section>

    <!-- Skills -->
    <section aria-label="Skills">
      <div class="section-label">Skills</div>
      <div class="skills-grid" id="skills"></div>
    </section>

    <!-- Experience -->
    <section aria-label="Experience">
      <div class="section-label">Experience</div>
      <div class="exp-list" id="experience"></div>
    </section>

    <!-- Projects -->
    <section aria-label="Projects">
      <div class="section-label">Projects</div>
      <div class="projects-grid" id="projects"></div>
    </section>

    <!-- Education -->
    <section aria-label="Education">
      <div class="section-label">Education</div>
      <div class="exp-list" id="education"></div>
    </section>

    <!-- Contact -->
    <section aria-label="Contact" id="contact-section">
      <div class="section-label">Contact</div>
      <div class="card contact-card" id="contact"></div>
    </section>

  </main>

  <!-- ── Footer ──────────────────────────────────────────────── -->
  <footer>
    <span>© <span id="footer-year"></span> <span id="footer-name"></span></span>
    <span>Built with GitHub Pages</span>
  </footer>

  <!-- Scripts: config first, then main -->
  <script src="config.js"></script>
  <script src="main.js"></script>
</body>
</html>
